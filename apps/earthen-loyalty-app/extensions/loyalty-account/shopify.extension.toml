# Learn more about configuring your Customer account UI extension:
# https://shopify.dev/api/customer-account-ui-extensions/unstable/configuration

# The version of APIs your extension will receive. Learn more:
# https://shopify.dev/docs/api/usage/versioning
api_version = "2026-04"

[[extensions]]
name = "Earthen Points"
handle = "loyalty-account"
type = "ui_extension"
uid = "8ea3c599-0904-df5e-db42-642a579c982e53dc2001"

# Full-page extension: adds an "Earthen Points" item to the account navigation
# and renders the balance + points history as its own page.
[[extensions.targeting]]
module = "./src/RewardsPage.jsx"
target = "customer-account.page.render"

[extensions.capabilities]
# Allows the extension to fetch the loyalty backend for the balance + history.
network_access = true
